services:
  - type: web
    name: cumsino-server
    runtime: node
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
